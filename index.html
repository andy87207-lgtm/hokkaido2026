<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hokkaido Family Trip 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F8FBFF; -webkit-tap-highlight-color: transparent; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .nav-glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); }
        .active-tab { color: #3b82f6; transform: translateY(-2px); transition: all 0.3s; }
        .card-shadow { box-shadow: 0 4px 20px rgba(185, 217, 235, 0.15); }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen relative pb-24">
<div id="app">
    <header class="pt-10 pb-6 px-6 bg-white shadow-sm">
        <h1 class="text-2xl font-bold text-gray-800">北海道家族旅行</h1>
        <p class="text-sm text-blue-400 font-medium mt-1">2026.06.04 — 06.08</p>
    </header>

    <main class="px-4">
        <section v-if="currentTab === 'itinerary'">
            <div class="flex overflow-x-auto space-x-3 py-4 hide-scrollbar">
                <div v-for="date in travelDates" :key="date.day" @click="selectedDate = date.day"
                     :class="['flex flex-col items-center min-w-[60px] py-3 rounded-2xl border transition-all', selectedDate === date.day ? 'bg-blue-500 text-white shadow-lg' : 'bg-white text-gray-400 border-gray-100']">
                    <span class="text-[10px] font-bold uppercase">{{ date.weekday }}</span>
                    <span class="text-xl font-bold">{{ date.day }}</span>
                </div>
            </div>

            <div class="space-y-4 mt-2">
                <div v-for="(item, index) in filteredItinerary" :key="index" @click="goNav(item.location)" 
                     class="bg-white p-5 rounded-3xl border border-gray-50 card-shadow active:scale-95 transition-all">
                    <div class="flex justify-between">
                        <div class="flex-1">
                            <div class="flex items-center space-x-2 mb-2">
                                <span :class="['text-[10px] px-2 py-0.5 rounded font-bold', getCatClass(item.category)]">{{ item.category }}</span>
                                <span class="text-[10px] font-mono text-gray-400">{{ item.time }}</span>
                            </div>
                            <h3 class="text-gray-800 font-bold text-base leading-snug">{{ item.name }}</h3>
                            <p v-if="item.note" class="mt-2 text-xs text-gray-500 bg-gray-50 p-2 rounded-xl leading-relaxed">{{ item.note }}</p>
                        </div>
                        <i data-lucide="map-pin" class="text-blue-200 w-5 h-5 ml-2 shrink-0"></i>
                    </div>
                </div>
                <div v-if="filteredItinerary.length === 0" class="text-center py-10 text-gray-300">
                    今天沒有安排行程喔
                </div>
            </div>
        </section>

        <section v-if="currentTab === 'info'" class="pt-6 space-y-4">
            <div class="bg-blue-600 p-6 rounded-3xl text-white shadow-xl text-center">
                <p class="text-xs font-bold opacity-70 mb-3">JPY 日幣 ➔ TWD 台幣 (0.21)</p>
                <div class="flex items-center space-x-3">
                    <input type="number" v-model="jpyInput" class="w-full bg-white/20 border-none rounded-xl p-3 text-white text-2xl font-bold focus:ring-0 text-center">
                </div>
                <div class="mt-4 text-3xl font-bold font-mono">≈ ${{ (jpyInput * 0.21).toLocaleString(undefined, {maximumFractionDigits: 0}) }}</div>
            </div>
            
            <div class="bg-white p-4 rounded-2xl border border-gray-100 flex items-center justify-between" @click="goNav('Vessel Inn Sapporo Nakajima Park')">
                <div class="flex items-center space-x-4">
                    <div class="bg-blue-50 p-3 rounded-xl"><i data-lucide="hotel" class="text-blue-500 w-5 h-5"></i></div>
                    <div><p class="font-bold text-gray-800 text-sm">Vessel Inn 中島公園</p><p class="text-xs text-gray-400">011-513-0700</p></div>
                </div>
                <i data-lucide="chevron-right" class="text-gray-300"></i>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto nav-glass border-t border-gray-100 flex justify-around items-center py-3 z-[100] shadow-2xl">
        <button v-for="tab in tabs" :key="tab.id" @click="currentTab = tab.id"
                :class="['flex flex-col items-center flex-1 transition-all', currentTab === tab.id ? 'active-tab text-blue-500' : 'text-gray-300']">
            <i :data-lucide="tab.icon" class="w-6 h-6"></i>
            <span class="text-[10px] mt-1 font-bold">{{ tab.label }}</span>
        </button>
    </nav>
</div>

<script>
    const { createApp, ref, computed, onMounted, onUpdated } = Vue;

    createApp({
        setup() {
            const currentTab = ref('itinerary');
            const selectedDate = ref(4);
            const jpyInput = ref(1000);

            const tabs = [
                { id: 'itinerary', icon: 'map-pin', label: '行程' },
                { id: 'info', icon: 'info', label: '資訊' }
            ];

            const travelDates = [
                { weekday: 'Thu', day: 4 }, { weekday: 'Fri', day: 5 }, { weekday: 'Sat', day: 6 }, { weekday: 'Sun', day: 7 }, { weekday: 'Mon', day: 8 }
            ];

            const itineraryItems = ref([
                // Day 1: 6/4 (Thu)
                { day: 4, category: '航班', name: 'BR116 長榮航空抵達', time: '15:00', location: 'New Chitose Airport', note: '抵達新千歲機場' },
                { day: 4, category: '其他', name: '搭機場巴士直達中島公園', time: '15:40', location: 'Nakajima Park Bus Stop', note: '車資 ¥1,100，約 70 分鐘' },
                { day: 4, category: '住宿', name: 'Vessel Inn Sapporo Check-in', time: '17:00', location: 'Vessel Inn Sapporo Nakajima Park', note: '飯店放行李稍作休息' },
                { day: 4, category: '購物', name: '狸小路商店街散策', time: '18:30', location: 'Tanukikoji Shopping Street', note: '晚餐：味噌拉麵或居酒屋' },
                
                // Day 2: 6/5 (Fri)
                { day: 5, category: '美食', name: '飯店海鮮丼早餐', time: '08:30', location: 'Vessel Inn Sapporo', note: '最強早餐！海鮮丼吃到飽' },
                { day: 5, category: '景點', name: '圓山公園 & 北海道神宮', time: '11:00', location: 'Hokkaido Jingu', note: '參拜 + 六花亭限定判官餅' },
                { day: 5, category: '景點', name: '藻岩山夜景', time: '19:30', location: 'Mt. Moiwa Ropeway', note: '日本新三大夜景，纜車最後班次注意' },
                
                // Day 3: 6/6 (Sat)
                { day: 6, category: '住宿', name: '前往新飯店放行李', time: '10:00', location: 'Sapporo Station', note: '札幌車站附近飯店 check-in' },
                { day: 6, category: '景點', name: '小樽運河 & 堺町通', time: '14:00', location: 'Otaru Canal', note: '逛玻璃工藝、北菓樓、LeTAO' },
                { day: 6, category: '景點', name: '小樽運河夜景', time: '19:30', location: 'Otaru Canal Night View', note: '20:30 搭 JR 返回札幌' },

                // Day 4: 6/7 (Sun)
                { day: 7, category: '購物', name: '札幌市區採購大作戰', time: '10:00', location: 'Tanukikoji Shopping Street', note: '藥妝、唐吉軻德、大丸百貨' },
                { day: 7, category: '美食', name: '成吉思汗烤肉晚餐', time: '18:30', location: 'Jingisukan Daruma', note: '札幌最後一夜大餐' },

                // Day 5: 6/8 (Mon)
                { day: 8, category: '其他', name: '新千歲機場 採購＋午餐', time: '11:30', location: 'New Chitose Airport', note: '機場拉麵道場、補買伴手禮' },
                { day: 8, category: '航班', name: 'BR115 報到起飛', time: '13:45', location: 'New Chitose Airport', note: '16:15 起飛，19:15 抵達桃園' }
            ]);

            const filteredItinerary = computed(() => itineraryItems.value.filter(i => i.day === selectedDate.value));

            const getCatClass = (cat) => {
                const colors = {
                    '航班': 'bg-purple-100 text-purple-600',
                    '景點': 'bg-blue-100 text-blue-600',
                    '美食': 'bg-orange-100 text-orange-600',
                    '住宿': 'bg-green-100 text-green-600',
                    '購物': 'bg-pink-100 text-pink-600'
                };
                return colors[cat] || 'bg-gray-100 text-gray-600';
            };

            const goNav = (loc) => {
                window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(loc)}`, '_blank');
            };

            const initIcons = () => { if (window.lucide) window.lucide.createIcons(); };
            
            onMounted(initIcons);
            onUpdated(initIcons);

            return { currentTab, tabs, travelDates, selectedDate, filteredItinerary, getCatClass, goNav, jpyInput };
        }
    }).mount('#app');
</script>
</body>
</html>
