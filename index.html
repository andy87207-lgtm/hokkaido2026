<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hokkaido Trip 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F8FBFF; -webkit-tap-highlight-color: transparent; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .nav-glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); }
        .active-tab { color: #3b82f6; transform: translateY(-2px); transition: all 0.3s; }
        .card-shadow { box-shadow: 0 4px 20px rgba(185, 217, 235, 0.2); }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen relative pb-24">
<div id="app">
    <header class="pt-10 pb-6 px-6 bg-white shadow-sm">
        <h1 class="text-2xl font-bold text-gray-800">北海道家族旅行</h1>
        <p class="text-sm text-blue-400 font-medium mt-1">2026.06.04 — 06.08</p>
    </header>

    <main class="px-4">
        <section v-if="currentTab === 'itinerary'">
            <div class="flex overflow-x-auto space-x-3 py-4 hide-scrollbar">
                <div v-for="date in travelDates" :key="date.day" @click="selectedDate = date.day"
                     :class="['flex flex-col items-center min-w-[60px] py-3 rounded-2xl border transition-all', selectedDate === date.day ? 'bg-blue-500 text-white shadow-lg' : 'bg-white text-gray-400 border-gray-100']">
                    <span class="text-[10px] font-bold uppercase">{{ date.weekday }}</span>
                    <span class="text-xl font-bold">{{ date.day }}</span>
                </div>
            </div>

            <div class="space-y-4 mt-2">
                <div v-for="(item, index) in filteredItinerary" :key="index" @click="goNav(item.location)" 
                     class="bg-white p-5 rounded-2xl border border-gray-50 card-shadow active:scale-95 transition-all">
                    <div class="flex justify-between">
                        <div class="flex-1">
                            <div class="flex items-center space-x-2 mb-2">
                                <span class="text-[10px] px-2 py-0.5 rounded bg-blue-50 text-blue-500 font-bold">{{ item.category }}</span>
                                <span class="text-[10px] font-mono text-gray-400">{{ item.time }}</span>
                            </div>
                            <h3 class="text-gray-800 font-bold text-base leading-snug">{{ item.name }}</h3>
                            <p v-if="item.note" class="mt-2 text-xs text-gray-500 bg-gray-50 p-2 rounded-lg leading-relaxed">{{ item.note }}</p>
                        </div>
                        <i data-lucide="map-pin" class="text-blue-200 w-5 h-5 ml-2"></i>
                    </div>
                </div>
            </div>
        </section>

        <section v-if="currentTab === 'info'" class="pt-6 space-y-4">
            <div class="bg-blue-600 p-6 rounded-3xl text-white shadow-xl text-center">
                <p class="text-xs font-bold opacity-70 mb-3">JPY 日幣 ➔ TWD 台幣 (0.21)</p>
                <div class="flex items-center space-x-3">
                    <input type="number" v-model="jpyInput" class="w-full bg-white/20 border-none rounded-xl p-3 text-white text-2xl font-bold focus:ring-0 text-center">
                </div>
                <div class="mt-4 text-3xl font-bold font-mono">≈ ${{ (jpyInput * 0.21).toLocaleString(undefined, {maximumFractionDigits: 0}) }}</div>
            </div>
            
            <div class="bg-white p-4 rounded-2xl border border-gray-100 flex items-center justify-between" @click="goNav('Vessel Inn Sapporo Nakajima Park')">
                <div class="flex items-center space-x-4">
                    <div class="bg-blue-50 p-3 rounded-xl"><i data-lucide="hotel" class="text-blue-500 w-5 h-5"></i></div>
                    <div><p class="font-bold text-gray-800 text-sm">Vessel Inn 中島公園</p><p class="text-xs text-gray-400">011-513-0700</p></div>
                </div>
                <i data-lucide="chevron-right" class="text-gray-300"></i>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto nav-glass border-t border-gray-100 flex justify-around items-center py-3 z-[100] shadow-2xl">
        <button v-for="tab in tabs" :key="tab.id" @click="currentTab = tab.id"
                :class="['flex flex-col items-center flex-1 transition-all', currentTab === tab.id ? 'active-tab text-blue-500' : 'text-gray-300']">
            <i :data-lucide="tab.icon" class="w-6 h-6"></i>
            <span class="text-[10px] mt-1 font-bold">{{ tab.label }}</span>
        </button>
    </nav>
</div>

<script>
    const { createApp, ref, computed, onMounted, onUpdated } = Vue;

    createApp({
        setup() {
            const currentTab = ref('itinerary');
            const selectedDate = ref(4);
            const jpyInput = ref(1000);

            const tabs = [
                { id: 'itinerary', icon: 'map-pin', label: '行程' },
                { id: 'info', icon: 'info', label: '資訊' }
            ];

            const travelDates = [
                { weekday: 'Thu', day: 4 }, { weekday: 'Fri', day: 5 }, { weekday: 'Sat', day: 6 }, { weekday: 'Sun', day: 7 }, { weekday: 'Mon', day: 8 }
            ];

            const itineraryItems = ref([
                { day: 4, category: '航班', name: 'BR116 長榮航空', time: '15:00 抵達', location: 'New Chitose Airport', note: '抵達新千歲機場' },
                { day: 4, category: '住宿', name: 'Vessel Inn Sapporo Nakajima Park', time: '17:00', location: 'Vessel Inn Sapporo Nakajima Park', note: 'Check-in 放行李' },
                { day: 5, category: '美食', name: '飯店海鮮丼早餐', time: '08:30', location: 'Vessel Inn Sapporo', note: '必吃海鮮丼吃到飽' },
                { day: 5, category: '景點', name: '北海道神宮', time: '11:00', location: 'Hokkaido Jingu', note: '六花亭限定判官餅' },
                { day: 6, category: '景點', name: '小樽運河散策', time: '14:00', location: 'Otaru Canal', note: '逛逛堺町通玻璃工藝' }
            ]);

            const filteredItinerary = computed(() => itineraryItems.value.filter(i => i.day === selectedDate.value));

            const goNav = (loc) => {
                window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(loc)}`, '_blank');
            };

            const initIcons = () => { if (window.lucide) window.lucide.createIcons(); };
            
            onMounted(initIcons);
            onUpdated(initIcons);

            return { currentTab, tabs, travelDates, selectedDate, filteredItinerary, goNav, jpyInput };
        }
    }).mount('#app');
</script>
</body>
</html>
